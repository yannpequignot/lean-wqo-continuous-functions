name = "WqoContinuousFunctions"
defaultTargets = ["WqoContinuousFunctions"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

# Library layout: four libraries in a single package (so Mathlib is required once).
# `BQO`, `ZeroDimensionalSpaces`, and `GeneralTopology` are foundational and depend **only on
# Mathlib** — each builds on its own (`lake build BQO`, etc.). The main library
# `WqoContinuousFunctions` builds on all three.
# Boundary invariant: neither foundational library imports any `WqoContinuousFunctions.*` module.

# Better-quasi-order foundations (ordinals, Ramsey, WQO/BQO). Mathlib-only.
[[lean_lib]]
name = "BQO"
globs = ["BQO.+"]

# General point-set topology facts (countable clopen partitions, discrete subspaces,
# disjoint open neighbourhoods) that are not specific to the main development and are
# Mathlib-candidates. Mathlib-only.
[[lean_lib]]
name = "GeneralTopology"
globs = ["GeneralTopology.+"]

# Standalone general-topology library: Baire/Cantor space basics, zero-dimensional
# spaces, the Cantor-scheme embedding machinery, and the universality of the countable
# rationals `CantorRat` (Sierpiński). Mathlib-only.
[[lean_lib]]
name = "ZeroDimensionalSpaces"
globs = ["ZeroDimensionalSpaces.+"]

[[lean_lib]]
name = "WqoContinuousFunctions"
# Every module under `WqoContinuousFunctions` is in the default build; nothing is excluded.
globs = ["WqoContinuousFunctions.+"]
